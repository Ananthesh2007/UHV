<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Quiz Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #e8ecf4;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Page Management */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Landing Page Styles */
        .landing-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
        }

        .logo-circle {
            width: 64px;
            height: 64px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .logo-circle svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .landing-card h1 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .subjects-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subject-btn {
            width: 100%;
            padding: 20px 24px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            background: white;
            color: #374151;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subject-btn:hover {
            border-color: #4f46e5;
            background: #f5f3ff;
            transform: translateX(4px);
        }

        .units-badge {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Units Dashboard */
        .units-container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4f46e5;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            padding: 8px 0;
            border: none;
            background: none;
            font-size: 15px;
        }

        .back-btn:hover {
            color: #4338ca;
        }

        .subject-title {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .units-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .unit-btn {
            width: 100%;
            padding: 24px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .unit-btn:hover {
            border-color: #4f46e5;
            background: #f5f3ff;
            transform: translateX(4px);
        }

        .unit-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .unit-number {
            width: 48px;
            height: 48px;
            background: #4f46e5;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .unit-name {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }

        .questions-badge {
            background: #f3f4f6;
            color: #6b7280;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Mode Selection Page */
        .mode-container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .mode-title {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .mode-subtitle {
            color: #6b7280;
            margin-bottom: 32px;
        }

        .mode-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 24px;
            padding: 8px 0;
            border: none;
            background: none;
            font-size: 14px;
        }

        .mode-back-btn:hover {
            color: #4f46e5;
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .mode-btn {
            width: 100%;
            padding: 24px;
            font-size: 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-align: center;
            background: white;
        }

        .mode-btn.pdf-order {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        .mode-btn.pdf-order:hover {
            background: #4f46e5;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .mode-btn.random {
            border-color: #db2777;
            color: #db2777;
        }

        .mode-btn.random:hover {
            background: #db2777;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(219, 39, 119, 0.3);
        }

        .mode-btn small {
            display: block;
            font-size: 14px;
            font-weight: 400;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Quiz Container Styles */
        .quiz-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 16px;
            padding: 8px 0;
            border: none;
            background: none;
            font-size: 14px;
        }

        .quiz-back-btn:hover {
            color: #4f46e5;
        }

        .quiz-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 8px;
        }

        .quiz-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .question-badge {
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: #1f2937;
            font-size: 14px;
        }

        .timer {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            font-size: 14px;
        }

        .score-display {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        .progress-line {
            height: 4px;
            background: #d1d5db;
            border-radius: 2px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4f46e5;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .question-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .question-text {
            font-size: 20px;
            color: #1f2937;
            margin-bottom: 24px;
            font-weight: 500;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            width: 100%;
        }

        .option:hover:not(.disabled) {
            border-color: #4f46e5;
            background: #f5f3ff;
        }

        .option-letter {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #6b7280;
            flex-shrink: 0;
            font-size: 14px;
        }

        .option-text {
            color: #374151;
            font-size: 15px;
            line-height: 1.4;
        }

        .option.correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .option.correct .option-letter {
            background: #22c55e;
            color: white;
        }

        .option.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .option.wrong .option-letter {
            background: #ef4444;
            color: white;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .quiz-controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-prev {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
        }

        .btn-prev:hover:not(:disabled) {
            background: #f9fafb;
        }

        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: #4f46e5;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: #4338ca;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .feedback {
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .feedback.correct {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #86efac;
        }

        .feedback.wrong {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* Results Styles */
        .results-card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
            font-size: 32px;
            font-weight: 700;
        }

        .results-message {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .btn-restart {
            background: #4f46e5;
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            .landing-card {
                padding: 32px 24px;
                margin: 20px auto;
            }
            
            .question-card {
                padding: 24px;
            }
            
            .question-text {
                font-size: 18px;
            }
        }
    </style>
    <!-- MathJax for rendering LaTeX equations -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <!-- PAGE 1: SUBJECTS DASHBOARD -->
        <div class="page active" id="subjectsPage">
            <div class="landing-card">
                <div class="logo-circle">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                
                <h1>Engineering Quiz Portal</h1>
                <p class="subtitle">Select a subject to start practicing</p>
                
                <div class="subjects-grid">
                    <button class="subject-btn" onclick="showUnits(1)">
                        <span>Material Chemistry For Devices and E-Waste Management</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(2)">
                        <span>Linear Algebra and Transform Techniques</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(3)">
                        <span>Elements of Electrical Engineering</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(4)">
                        <span>Basic Electronics</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(5)">
                        <span>Introduction to Python Programming</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(6)">
                        <span>Environmental Science and Sustainability</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(7)">
                        <span>Universal Human Values & Professional Ethics</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                    
                    <button class="subject-btn" onclick="showUnits(8)">
                        <span>Biology for Engineers</span>
                        <span class="units-badge">5 Units</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- PAGE 2: UNITS DASHBOARD -->
        <div class="page" id="unitsPage">
            <div class="units-container">
                <button class="back-btn" onclick="backToSubjects()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Back to Subjects
                </button>
                
                <h2 class="subject-title" id="unitsSubjectTitle">Subject Name</h2>
                
                <div class="units-grid" id="unitsGrid">
                    <!-- Units will be generated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- PAGE 3: QUIZ MODE SELECTION -->
        <div class="page" id="modePage">
            <div class="mode-container">
                <button class="mode-back-btn" onclick="backToUnits()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Back to Units
                </button>
                
                <h2 class="mode-title">Select Quiz Mode</h2>
                <p class="mode-subtitle">Choose how you want to take the quiz</p>
                
                <div class="mode-buttons">
                    <button class="mode-btn pdf-order" onclick="startQuiz('pdf')">
                        📄 PDF Order
                        <small>Questions in original order, options shuffled</small>
                    </button>
                    <button class="mode-btn random" onclick="startQuiz('random')">
                        🎲 Random Mode
                        <small>Questions and options both shuffled</small>
                    </button>
                </div>
            </div>
        </div>

        <!-- PAGE 4: QUIZ -->
        <div class="page" id="quizPage">
            <button class="quiz-back-btn" onclick="backToModeSelection()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Mode Selection
            </button>
            
            <div class="quiz-header-bar">
                <div class="quiz-header-left">
                    <span class="question-badge" id="questionCounter">Q1/20</span>
                    <span class="timer">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span id="timer">00:00</span>
                    </span>
                </div>
                <span class="score-display" id="scoreDisplay">Score: 0/0</span>
            </div>
            
            <div class="progress-line">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <div class="question-card">
            <div class="question-text" id="questionText"></div>   
                
                <div class="feedback" id="feedback"></div>
                
                <div class="options-container" id="optionsContainer"></div>
                
                <div class="quiz-controls">
                    <button class="btn btn-prev" id="prevBtn" onclick="previousQuestion()" disabled>← Previous</button>
                    <button class="btn btn-submit" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
                </div>
            </div>
        </div>

        <!-- PAGE 5: RESULTS -->
        <div class="page" id="resultsPage">
            <div class="results-card">
                <div class="score-circle" id="finalScore">0%</div>
                <h2 style="color: #1f2937; margin-bottom: 12px;">Quiz Completed!</h2>
                <p class="results-message" id="resultsMessage"></p>
                <button class="btn-restart" onclick="backToSubjects()">← Back to Subjects</button>
            </div>
        </div>
    </div>

    <script>
        // Subject and Unit Data
const subjects = {
    1: { name: "Material Chemistry For Devices and E-Waste Management", units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"] },
    2: { name: "Linear Algebra and Transform Techniques", units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"] },
    3: { name: "Elements of Electrical Engineering", units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"] },
    4: { name: "Basic Electronics", units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"] },
    5: { name: "Introduction to Python Programming", units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"] },
    6: { name: "Environmental Science and Sustainability", units: ["Unit 1", "Unit 2", "Unit 3"] },
    7: { name: "Universal Human Values & Professional Ethics", units: ["Unit 1", "Unit 2", "Unit 3"] },
    8: { name: "Biology for Engineers", units: ["Unit 1", "Unit 2", "Unit 3"] }
};

// ============================================
// QUESTION DATABASE
// ============================================
const questionDatabase = {
    // SUBJECT 1: Material Chemistry for Devices and E-Waste Management
    1: {
        // UNIT 1: Electrode & Energy Systems (38 Questions)
        1: [
            { q: "In a galvanic cell,", options: ["Anode is positive terminal", "Cathode is negative terminal", "Anode is negative terminal", "Reaction is non-spontaneous"], correct: 2 },
            { q: "An electrode is considered as a cathode when it has", options: ["High reduction potential", "Low reduction potential", "High oxidation potential", "Depends on the nature of metal"], correct: 0 },
            { q: "A working concentration cell is made of two half cells having", options: ["Identical electrolytes and identical concentrations", "Identical electrolytes but different concentrations", "Different electrolytes and identical concentrations", "Different electrolytes and different concentrations"], correct: 1 },
            { q: "Electrode potential of calomel electrode", options: ["Varies directly with concentration of KCl", "Varies inversely with concentration of KCl", "Is independent of concentration of KCl", "Depends only on the concentration of calomel"], correct: 1 },
            { q: "When clubbed with copper electrode, calomel electrode acts as", options: ["Anode", "Cathode", "Either as anode or cathode", "Auxiliary electrode"], correct: 0 },
            { q: "A calomel electrode is an example for", options: ["Reference electrode", "Ion selective electrode", "Inert electrode", "Gas electrode"], correct: 0 },
            { q: "The calomel electrode is represented as", options: ["Hg | Hg2Cl2 (s) | KCl (saturated or standard)", "Ag | AgCl (s) | KCl (saturated)", "Hg | HgCl2 (s) | KCl (saturated or standard)", "Ag | AgCl (s) | HCl (0.1M) | glass"], correct: 0 },
            { q: "Which is the sparingly soluble salt present in calomel electrode?", options: ["HgCl", "Hg2Cl2", "KCl", "HgCl2"], correct: 1 },
            { q: "EMF of electrolyte concentration cell is independent of", options: ["Number of electrons involved", "Temperature", "Standard electrode potential of electrode", "Electrolyte concentration"], correct: 2 },
            { q: "The potential of the calomel electrode depends on the concentration of", options: ["Hg", "Hg2Cl2", "KOH", "KCl"], correct: 3 },
            { q: "What is the electrode potential of the calomel electrode with saturated KCl solution at 298K?", options: ["0.334 V", "0.281 V", "0.242 V", "0.0591 V"], correct: 2 },
            { q: "The reference electrode that can be used to determine the potential of zinc electrode is", options: ["Glass electrode", "Platinum electrode", "Copper electrode", "Calomel electrode"], correct: 3 },
            { q: "A glass electrode is commonly used to measure", options: ["Oxidation potential", "Reduction potential", "pH of a solution", "Conductivity of a solution"], correct: 2 },
            { q: "Glass electrode is sensitive to ions.", options: ["Sodium", "Hydrogen", "Chloride", "Hydroxide"], correct: 1 },
            { q: "Which of the following is an example for ion selective electrode?", options: ["Platinum electrode", "Gas electrode", "Calomel electrode", "Glass electrode"], correct: 3 },
            { q: "Identify which of the following statement/s does/do not hold true for glass electrode? (i) The glass membrane is made of a mixture of silicon, sodium and carbon oxides. (ii) The glass membrane exhibits electrical conductivity. (iii) The potential of the glass electrode is a combination of boundary potential, asymmetry potential and internal reference electrode potential.", options: ["Only (i)", "Only (ii)", "Both (i) and (iii)", "Both (ii) and (iii)"], correct: 0 },
            { q: "Which of the following is an example for working concentration cell?", options: ["Fe|FeSO4(0.10M) ||CuSO4(0.10M) |Cu", "Mg|Mg2+(aq) || Cd2+(aq) |Cd", "Ag|AgNO3 (0.10M) ||AgNO3 (0.50M) |Ag", "Fe | Fe2+(0.015M) || Ag+(0.13M) |Ag"], correct: 2 },
            { q: "Among the below given statements, which of them are true for concentration cell? (i) Electrode immersed in dilute solution behaves as anode. (ii) The Nernst equation of a concentration cell is independent of temperature and electrode. (iii) Concentration cells can be used to measure ion concentration in a solution.", options: ["(i), (ii) and (iii)", "(i) and (ii)", "(ii) and (iii)", "(i) and (iii)"], correct: 3 },
            { q: "The EMF of the concentration cell Ag(s)|Ag+(0.05M)||Ag+(0.05M)|Ag at 298K is", options: ["0.0591V", "0.0295V", "0V", "-0.0591V"], correct: 2 },
            { q: "The number of galvanic cells, each of 1.1 V, required to construct a 11 V battery is", options: ["15", "22", "11", "10"], correct: 3 },

            { q: "This is worn behind the ear or on the body, captures sound and turns it into digital code", options: ["Sound processor", "Battery", "Transmitting coil", "Electrode array"], correct: 0 },
            { q: "Choose the correct answer for which the benefits of a cochlear implant for hearing impaired person is not true", options: ["Cannot focus better when in noisy environment", "Feel safer", "Reconnect with missed sounds", "Hear well"], correct: 0 },
            { q: "Since 1972 more than _______ different cochlear implants have been done.", options: ["16", "17", "18", "19"], correct: 0 },
            { q: "The hearing aids in the ear", options: ["Makes sound louder", "Makes sound smoother", "Makes sound silent", "Makes sound noiseless"], correct: 0 }
]
}
};

let currentSubject = 1;
let currentUnit = 1;
let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let answered = false;
let mode = 'pdf';
let selectedAnswer = null;
let startTime;
let timerInterval;
let userAnswers = [];

// Navigation Functions
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

function showUnits(subjectId) {
    currentSubject = subjectId;
    const subject = subjects[subjectId];
    document.getElementById('unitsSubjectTitle').textContent = subject.name;
    
    const unitsGrid = document.getElementById('unitsGrid');
    unitsGrid.innerHTML = '';
    
    subject.units.forEach((unitName, index) => {
        const btn = document.createElement('button');
        btn.className = 'unit-btn';
        btn.onclick = () => selectUnit(index + 1);
        btn.innerHTML = `
            <div class="unit-info">
                <div class="unit-number">${index + 1}</div>
                <div class="unit-name">${unitName}</div>
            </div>
            <span class="questions-badge">Questions</span>
        `;
        unitsGrid.appendChild(btn);
    });
    
    showPage('unitsPage');
}

function selectUnit(unitId) {
    currentUnit = unitId;
    showPage('modePage');
}

function backToSubjects() {
    if (timerInterval) clearInterval(timerInterval);
    showPage('subjectsPage');
}

function backToUnits() {
    showPage('unitsPage');
}

function backToModeSelection() {
    if (timerInterval) clearInterval(timerInterval);
    showPage('modePage');
}

// Quiz Functions
function shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

function prepareQuestions(modeType) {
    let questions = [...currentQuestions];
    
    // Always shuffle options within each question
    questions = questions.map(q => {
        const optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
        const shuffledOptions = shuffleArray(optionsWithIndex);
        const newCorrectIndex = shuffledOptions.findIndex(opt => opt.originalIndex === q.correct);
        
        return {
            q: q.q,
            options: shuffledOptions.map(opt => opt.text),
            correct: newCorrectIndex
        };
    });
    
    // Only shuffle questions if random mode
    if (modeType === 'random') {
        questions = shuffleArray(questions);
    }
    
    return questions;
}

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const seconds = (elapsed % 60).toString().padStart(2, '0');
    const timerEl = document.getElementById('timer');
    if (timerEl) timerEl.textContent = `${minutes}:${seconds}`;
}

function startQuiz(selectedMode) {
    mode = selectedMode;
    // Load questions from database
    currentQuestions = loadQuestionsForUnit(currentSubject, currentUnit);
    
    if (currentQuestions.length === 0) {
        alert('No questions available for this unit yet!');
        return;
    }
    
    currentQuestions = prepareQuestions(mode);
    
    currentQuestionIndex = 0;
    score = 0;
    selectedAnswer = null;
    userAnswers = [];
    startTime = Date.now();
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 1000);
    
    showPage('quizPage');
    displayQuestion();
}

function loadQuestionsForUnit(subjectId, unitId) {
    // Check if we have questions for this subject and unit
    if (questionDatabase[subjectId] && questionDatabase[subjectId][unitId]) {
        return questionDatabase[subjectId][unitId];
    }
    return [];
}

 function displayQuestion() {
    answered = false;
    const q = currentQuestions[currentQuestionIndex];

    document.getElementById('questionCounter').textContent = `Q${currentQuestionIndex+1}/${currentQuestions.length}`;
    document.getElementById('scoreDisplay').textContent = `Score: ${score}/${currentQuestionIndex}`;

    const qt = document.getElementById('questionText');
    qt.innerHTML = q.q;                     // ← Use innerHTML (important for LaTeX)

    // Render LaTeX with MathJax
    if (window.MathJax) {
        MathJax.typesetPromise([qt]).catch(() => {});
    }

    // Options
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span>`;
        btn.onclick = () => selectOption(i, btn);
        container.appendChild(btn);
    });

    document.getElementById('submitBtn').textContent = 'Submit Answer';
    document.getElementById('submitBtn').onclick = submitAnswer;
    document.getElementById('submitBtn').disabled = true;
}
    
    const feedback = document.getElementById('feedback');
    feedback.style.display = 'none';
    
    const submitBtn = document.getElementById('submitBtn');
    const prevBtn = document.getElementById('prevBtn');
    
    if (prevBtn) prevBtn.disabled = currentQuestionIndex === 0;
    
    if (previousAnswer !== undefined && previousAnswer !== null) {
        answered = true;
        selectedAnswer = previousAnswer.selected;
        const isCorrect = previousAnswer.correct;
        
        const options = optionsContainer.querySelectorAll('.option');
        
        options.forEach((opt, idx) => {
            opt.classList.add('disabled');
            if (idx === question.correct) opt.classList.add('correct');
            if (idx === selectedAnswer) {
                if (idx === question.correct) opt.classList.add('correct');
                else opt.classList.add('wrong');
            }
        });
        
        if (isCorrect) {
            feedback.textContent = '✅ Correct! Well done!';
            feedback.className = 'feedback correct';
        } else {
            feedback.textContent = `❌ Incorrect. You chose: ${question.options[selectedAnswer]}. The correct answer is: ${question.options[question.correct]}`;
            feedback.className = 'feedback wrong';
        }
        feedback.style.display = 'block';
        
        submitBtn.textContent = 'Next →';
        submitBtn.onclick = nextQuestion;
        submitBtn.disabled = false;
    } else {
        selectedAnswer = null;
        submitBtn.textContent = 'Submit Answer';
        submitBtn.disabled = true;
        submitBtn.onclick = submitAnswer;
    }
}

function selectOption(index, btnElement) {
    if (answered) return;
    selectedAnswer = index;
    
    document.querySelectorAll('.option').forEach(opt => {
        opt.style.borderColor = '#e5e7eb';
        opt.style.background = 'white';
    });
    
    btnElement.style.borderColor = '#4f46e5';
    btnElement.style.background = '#f5f3ff';
    
    document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
    if (selectedAnswer === null || answered) return;
    answered = true;
    
    const question = currentQuestions[currentQuestionIndex];
    const options = document.querySelectorAll('.option');
    const feedback = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');
    
    const isCorrect = selectedAnswer === question.correct;
    
    userAnswers[currentQuestionIndex] = {
        selected: selectedAnswer,
        correct: isCorrect
    };
    
    if (isCorrect) score++;
    
    options.forEach((opt, idx) => {
        opt.classList.add('disabled');
        if (idx === question.correct) opt.classList.add('correct');
        if (idx === selectedAnswer) {
            if (idx === question.correct) opt.classList.add('correct');
            else opt.classList.add('wrong');
        }
    });
    
    if (isCorrect) {
        feedback.textContent = '✅ Correct! Well done!';
        feedback.className = 'feedback correct';
    } else {
        feedback.textContent = `❌ Incorrect. You chose: ${question.options[selectedAnswer]}. The correct answer is: ${question.options[question.correct]}`;
        feedback.className = 'feedback wrong';
    }
    
    feedback.style.display = 'block';
    document.getElementById('scoreDisplay').textContent = 
        `Score: ${score}/${currentQuestionIndex + 1}`;
    
    submitBtn.textContent = 'Next →';
    submitBtn.onclick = nextQuestion;
    submitBtn.disabled = false;
}

function previousQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        displayQuestion();
    }
}

function nextQuestion() {
    currentQuestionIndex++;
    
    if (currentQuestionIndex < currentQuestions.length) {
        displayQuestion();
    } else {
        if (timerInterval) clearInterval(timerInterval);
        showResults();
    }
}

function showResults() {
    showPage('resultsPage');
    
    const percentage = Math.round((score / currentQuestions.length) * 100);
    document.getElementById('finalScore').textContent = `${percentage}%`;
    
    let message = '';
    if (percentage >= 90) message = '🌟 Outstanding! You mastered this unit!';
    else if (percentage >= 70) message = '👏 Great job! You have a solid understanding.';
    else if (percentage >= 50) message = '👍 Good effort! Keep learning.';
    else message = '📚 Review the material and try again.';
    
    document.getElementById('resultsMessage').textContent = 
        `${message} You answered ${score} out of ${currentQuestions.length} correctly.`;
}
